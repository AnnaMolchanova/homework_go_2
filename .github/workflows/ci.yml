name: homework-2-ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Format check
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

      - name: Coverage check
        run: make coverage-check

      - name: Build binaries
        run: make build
